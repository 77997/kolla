name: Build Kolla Images

on:
  push:
    branches:
      - master
      - 'stable/*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      images:
        description: 'Specific images to build (comma-separated, empty for all)'
        required: false
        default: ''
      profile:
        description: 'Kolla profile to build (ignored when using matrix)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  NAMESPACE: 77997/kolla
  OPENSTACK_RELEASE: '2025.2'
  BASE_DISTRO: debian

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [infra, main, aux, default]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          tool-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 images (${{ matrix.profile }})
        run: |
          IMAGES="${{ github.event.inputs.images }}"
          
          BUILD_ARGS="--base debian --base-arch x86_64 --tag ${{ env.OPENSTACK_RELEASE }}-amd64"
          BUILD_ARGS="$BUILD_ARGS --namespace ${{ env.REGISTRY }}/${{ env.NAMESPACE }}"
          BUILD_ARGS="$BUILD_ARGS --push --threads 4"
          
          if [ -n "$IMAGES" ]; then
            BUILD_ARGS="$BUILD_ARGS --regex $IMAGES"
          else
            BUILD_ARGS="$BUILD_ARGS --profile ${{ matrix.profile }}"
          fi
          
          python -m kolla.cmd.build $BUILD_ARGS

  build-ppc64le:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [infra, main, aux, default]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          tool-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install docker

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/ppc64le

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-build OpenSearch tarball for ppc64le
        if: matrix.profile == 'infra'
        run: |
          # OpenSearch is Java bytecode - platform-independent. Build natively
          # on the amd64 runner to avoid both QEMU crypto emulation bugs and
          # Docker legacy builder cross-platform COPY --from limitations.
          docker run --rm \
            -v "${{ github.workspace }}/docker/opensearch/opensearch:/output" \
            eclipse-temurin:21-jdk \
            bash -c '
              set -ex
              apt-get update && apt-get install -y --no-install-recommends git ca-certificates
              git clone --depth 1 --branch 2.18.0 \
                https://github.com/opensearch-project/OpenSearch.git /build/OpenSearch
              cd /build/OpenSearch
              ./gradlew :distribution:archives:no-jdk-linux-ppc64le-tar:assemble \
                -Dbuild.snapshot=false
              cp distribution/archives/no-jdk-linux-ppc64le-tar/build/distributions/opensearch-min-*.tar.gz /output/
            '
          ls -la docker/opensearch/opensearch/opensearch-min-*.tar.gz

      - name: Build ppc64le images (${{ matrix.profile }})
        run: |
          IMAGES="${{ github.event.inputs.images }}"
          
          BUILD_ARGS="--base debian --base-arch ppc64le --tag ${{ env.OPENSTACK_RELEASE }}-ppc64le"
          BUILD_ARGS="$BUILD_ARGS --namespace ${{ env.REGISTRY }}/${{ env.NAMESPACE }}"
          BUILD_ARGS="$BUILD_ARGS --push --threads 4"
          BUILD_ARGS="$BUILD_ARGS --platform linux/ppc64le"
          
          if [ -n "$IMAGES" ]; then
            BUILD_ARGS="$BUILD_ARGS --regex $IMAGES"
          else
            BUILD_ARGS="$BUILD_ARGS --profile ${{ matrix.profile }}"
          fi
          
          python -m kolla.cmd.build $BUILD_ARGS

  create-manifests:
    needs: [build-amd64, build-ppc64le]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          # List all images that were pushed to the registry
          # Query the registry for available tags
          
          echo "Fetching image list from registry..."
          
          # Get list of packages from GitHub Container Registry API
          PACKAGES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/orgs/77997/packages?package_type=container&per_page=100" \
            | jq -r '.[].name' | grep "^kolla/" | sed 's|^kolla/||' || echo "")
          
          if [ -z "$PACKAGES" ]; then
            echo "No packages found or API call failed. Trying alternative method..."
            # Alternative: use skopeo to list tags if available
            PACKAGES=$(skopeo list-tags docker://${{ env.REGISTRY }}/${{ env.NAMESPACE }}/base 2>/dev/null | jq -r '.Tags[]' | grep -oP '^[^:]+' | sort -u || echo "")
          fi
          
          # Fallback: use a predefined list of common images
          if [ -z "$PACKAGES" ]; then
            echo "Using predefined image list..."
            PACKAGES="base openstack-base keystone glance nova-api nova-compute neutron-server horizon heat-api cinder-api placement-api mariadb-server rabbitmq memcached etcd haproxy keepalived fluentd kolla-toolbox cron"
          fi
          
          for IMAGE_NAME in $PACKAGES; do
            echo "Creating manifest for $IMAGE_NAME..."
            
            # Create manifest list combining amd64 and ppc64le
            docker manifest create \
              ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }} \
              ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }}-amd64 \
              ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }}-ppc64le \
              --amend 2>/dev/null || echo "  Skipped $IMAGE_NAME (missing one or both arch tags)"
            
            # Push manifest if created successfully
            docker manifest push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }} 2>/dev/null || true
          done
          
          echo "Manifest creation complete."
