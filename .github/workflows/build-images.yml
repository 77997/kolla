name: Build Kolla Images

on:
  push:
    branches:
      - master
      - 'stable/*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      images:
        description: 'Specific images to build (comma-separated, empty for all)'
        required: false
        default: ''
      profile:
        description: 'Kolla profile to build (ignored when using matrix)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  NAMESPACE: 77997/kolla
  OPENSTACK_RELEASE: '2025.2'
  BASE_DISTRO: debian

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [infra, main, aux, default]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          tool-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 images (${{ matrix.profile }})
        run: |
          IMAGES="${{ github.event.inputs.images }}"
          
          BUILD_ARGS="--base debian --base-arch x86_64 --tag ${{ env.OPENSTACK_RELEASE }}-amd64"
          BUILD_ARGS="$BUILD_ARGS --namespace ${{ env.REGISTRY }}/${{ env.NAMESPACE }}"
          BUILD_ARGS="$BUILD_ARGS --push --threads 4"
          BUILD_ARGS="$BUILD_ARGS --summary-json-file ${{ github.workspace }}/summary.json"
          
          if [ -n "$IMAGES" ]; then
            BUILD_ARGS="$BUILD_ARGS --regex $IMAGES"
          else
            BUILD_ARGS="$BUILD_ARGS --profile ${{ matrix.profile }}"
          fi
          
          python -m kolla.cmd.build $BUILD_ARGS

      - name: Upload build summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.profile }}-amd64
          path: summary.json
          retention-days: 1
          if-no-files-found: warn

  build-ppc64le:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [infra, main, aux, default]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          tool-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install docker

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/ppc64le

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-build OpenSearch tarball for ppc64le
        if: matrix.profile == 'infra'
        run: |
          # OpenSearch is Java bytecode - platform-independent. Build natively
          # on the amd64 runner to avoid both QEMU crypto emulation bugs and
          # Docker legacy builder cross-platform COPY --from limitations.
          docker run --rm \
            -v "${{ github.workspace }}/docker/opensearch/opensearch:/output" \
            eclipse-temurin:21-jdk \
            bash -c '
              set -ex
              apt-get update && apt-get install -y --no-install-recommends git ca-certificates
              git clone --depth 1 --branch 2.18.0 \
                https://github.com/opensearch-project/OpenSearch.git /build/OpenSearch
              cd /build/OpenSearch
              ./gradlew :distribution:archives:no-jdk-linux-ppc64le-tar:assemble \
                -Dbuild.snapshot=false
              cp distribution/archives/no-jdk-linux-ppc64le-tar/build/distributions/opensearch-min-*.tar.gz /output/
            '
          ls -la docker/opensearch/opensearch/opensearch-min-*.tar.gz

      - name: Pre-build Go binaries for ppc64le
        if: matrix.profile == 'infra'
        run: |
          # letsencrypt-lego: cross-compile natively on amd64 runner
          docker run --rm \
            -v "${{ github.workspace }}/docker/letsencrypt/letsencrypt-lego:/output" \
            golang:1.25-trixie \
            bash -c '
              set -ex
              git clone --depth 1 --branch v4.27.0 \
                https://github.com/go-acme/lego.git /build/lego
              cd /build/lego
              CGO_ENABLED=0 GOOS=linux GOARCH=ppc64le go build -o /output/lego ./cmd/lego
            '
          ls -la docker/letsencrypt/letsencrypt-lego/lego

      - name: Cache ProxySQL ppc64le binary
        if: matrix.profile == 'infra' || matrix.profile == 'default'
        uses: actions/cache@v4
        with:
          path: docker/proxysql/proxysql
          key: proxysql-ppc64le-v2.7.1

      - name: Pre-build ProxySQL for ppc64le
        if: matrix.profile == 'infra' || matrix.profile == 'default'
        run: |
          BINARY_PATH="${{ github.workspace }}/docker/proxysql/proxysql"
          if [ -f "$BINARY_PATH" ]; then
            echo "Using cached ProxySQL binary"
            file "$BINARY_PATH"
            exit 0
          fi
          # Build using QEMU emulation (slow first run, cached afterward)
          # Uses debian:trixie to match base_image:base_distro_tag (config.py line 29)
          docker run --rm --platform linux/ppc64le \
            -v "${{ github.workspace }}/docker/proxysql:/output" \
            debian:trixie \
            bash -c '
              set -ex
              apt-get update && apt-get install -y --no-install-recommends \
                build-essential pkg-config cmake g++ gcc git \
                libssl-dev libgnutls28-dev default-libmysqlclient-dev \
                uuid-dev libncurses-dev libicu-dev libevent-dev \
                ca-certificates automake bzip2 python3
              git clone --depth 1 --branch v2.7.1 \
                https://github.com/sysown/proxysql.git /build/proxysql
              cd /build/proxysql
              make -j$(nproc)
              cp src/proxysql /output/proxysql
            '
          ls -la "$BINARY_PATH"

      - name: Build ppc64le images (${{ matrix.profile }})
        run: |
          IMAGES="${{ github.event.inputs.images }}"
          
          BUILD_ARGS="--base debian --base-arch ppc64le --tag ${{ env.OPENSTACK_RELEASE }}-ppc64le"
          BUILD_ARGS="$BUILD_ARGS --namespace ${{ env.REGISTRY }}/${{ env.NAMESPACE }}"
          BUILD_ARGS="$BUILD_ARGS --push --threads 4"
          BUILD_ARGS="$BUILD_ARGS --platform linux/ppc64le"
          BUILD_ARGS="$BUILD_ARGS --summary-json-file ${{ github.workspace }}/summary.json"
          
          if [ -n "$IMAGES" ]; then
            BUILD_ARGS="$BUILD_ARGS --regex $IMAGES"
          else
            BUILD_ARGS="$BUILD_ARGS --profile ${{ matrix.profile }}"
          fi
          
          python -m kolla.cmd.build $BUILD_ARGS

      - name: Upload build summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.profile }}-ppc64le
          path: summary.json
          retention-days: 1
          if-no-files-found: warn

  create-manifests:
    needs: [build-amd64, build-ppc64le]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build summaries
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          path: summaries

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail

          # Collect image names that built successfully on EACH architecture.
          # jq processes multiple JSON files, outputting names from each.
          AMD64_IMAGES=$(jq -r '.built[]?.name' summaries/summary-*-amd64/summary.json 2>/dev/null | sort -u || echo "")
          PPC64LE_IMAGES=$(jq -r '.built[]?.name' summaries/summary-*-ppc64le/summary.json 2>/dev/null | sort -u || echo "")

          if [ -z "$AMD64_IMAGES" ] || [ -z "$PPC64LE_IMAGES" ]; then
            echo "WARNING: Missing images for one or both architectures"
            echo "  amd64 images: $(echo "$AMD64_IMAGES" | wc -w)"
            echo "  ppc64le images: $(echo "$PPC64LE_IMAGES" | wc -w)"
            if [ -z "$AMD64_IMAGES" ] && [ -z "$PPC64LE_IMAGES" ]; then
              echo "ERROR: No images found for either architecture"
              exit 1
            fi
          fi

          # Intersect: only create manifests for images built on BOTH arches
          COMMON_IMAGES=$(comm -12 <(echo "$AMD64_IMAGES") <(echo "$PPC64LE_IMAGES"))

          if [ -z "$COMMON_IMAGES" ]; then
            echo "WARNING: No common images found across architectures"
            exit 0
          fi

          TOTAL=$(echo "$COMMON_IMAGES" | wc -l)
          echo "Creating manifests for $TOTAL images..."

          CREATED=0
          FAILED=0
          for IMAGE_NAME in $COMMON_IMAGES; do
            FULL_AMD64="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }}-amd64"
            FULL_PPC64LE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }}-ppc64le"
            FULL_MANIFEST="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${IMAGE_NAME}:${{ env.OPENSTACK_RELEASE }}"

            echo "[$((CREATED + FAILED + 1))/$TOTAL] $IMAGE_NAME"

            # Remove any stale local manifest from a previous run
            docker manifest rm "$FULL_MANIFEST" 2>/dev/null || true

            if docker manifest create "$FULL_MANIFEST" "$FULL_AMD64" "$FULL_PPC64LE"; then
              if docker manifest push "$FULL_MANIFEST"; then
                CREATED=$((CREATED + 1))
              else
                echo "  ERROR: Failed to push manifest for $IMAGE_NAME"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "  ERROR: Failed to create manifest for $IMAGE_NAME"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "Summary: $CREATED created, $FAILED failed out of $TOTAL"
          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi
